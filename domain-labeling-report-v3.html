<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OU Orb Scenario Report v3</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=DM+Sans:wght@400;500;700&family=Pretendard+Variable:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --ou-bg: #e8ecf1;
  --ou-shadow-dark: rgba(163,177,198,0.6);
  --ou-shadow-light: rgba(255,255,255,0.6);
  --ou-text-body: rgba(0,0,0,0.58);
  --ou-text-strong: rgba(0,0,0,0.76);
  --ou-text-heading: rgba(0,0,0,0.88);
  --ou-text-muted: rgba(0,0,0,0.32);
  --ou-text-secondary: rgba(0,0,0,0.48);
  --ou-text-disabled: rgba(0,0,0,0.18);
  --ou-border-subtle: rgba(0,0,0,0.05);
  --ou-accent: #e8976b;
  --ou-accent2: #f5c16c;
  --ou-neu-raised-xs: 2px 2px 4px var(--ou-shadow-dark), -2px -2px 4px var(--ou-shadow-light);
  --ou-neu-raised-sm: 3px 3px 6px var(--ou-shadow-dark), -3px -3px 6px var(--ou-shadow-light);
  --ou-neu-raised-md: 6px 6px 12px var(--ou-shadow-dark), -6px -6px 12px var(--ou-shadow-light);
  --ou-neu-raised-lg: 10px 10px 20px var(--ou-shadow-dark), -10px -10px 20px var(--ou-shadow-light);
  --ou-neu-pressed-sm: inset 2px 2px 5px var(--ou-shadow-dark), inset -2px -2px 5px var(--ou-shadow-light);
  --ou-neu-pressed-md: inset 4px 4px 8px var(--ou-shadow-dark), inset -4px -4px 8px var(--ou-shadow-light);
  --ou-radius-pill: 999px;
  --ou-radius-lg: 20px;
  --ou-radius-md: 12px;
  --ou-radius-sm: 8px;
  --ou-radius-xs: 4px;
  --ou-font-logo: 'Orbitron', sans-serif;
  --ou-font-display: 'DM Sans', sans-serif;
  --ou-font-body: 'Pretendard Variable', 'DM Sans', -apple-system, system-ui, sans-serif;
  --ou-font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--ou-bg);
  font-family: var(--ou-font-body);
  color: var(--ou-text-body);
  line-height: 1.6;
  padding: 20px;
}
.container { max-width: 1100px; margin: 0 auto; }

/* Logo */
.logo-wrap { text-align:center; margin-bottom: 8px; }
.logo-wrap svg { width: 80px; height: auto; fill: var(--ou-text-heading); }
.report-title {
  text-align: center;
  font-family: var(--ou-font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--ou-text-heading);
  margin-bottom: 6px;
}
.report-sub {
  text-align: center;
  font-size: 14px;
  color: var(--ou-text-secondary);
  margin-bottom: 40px;
}

/* Neu cards */
.card {
  background: var(--ou-bg);
  border-radius: var(--ou-radius-lg);
  box-shadow: var(--ou-neu-raised-md);
  padding: 28px;
  margin-bottom: 24px;
}
.card-sm {
  background: var(--ou-bg);
  border-radius: var(--ou-radius-md);
  box-shadow: var(--ou-neu-raised-sm);
  padding: 18px;
  margin-bottom: 16px;
}
.pressed {
  box-shadow: var(--ou-neu-pressed-md);
  border-radius: var(--ou-radius-md);
  padding: 14px;
  background: var(--ou-bg);
}
.pressed-sm {
  box-shadow: var(--ou-neu-pressed-sm);
  border-radius: var(--ou-radius-sm);
  padding: 10px 14px;
  background: var(--ou-bg);
}

/* Section titles */
.section-title {
  font-family: var(--ou-font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--ou-text-heading);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-xs);
  font-size: 14px;
  font-weight: 700;
  color: var(--ou-accent);
}

/* Summary stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-sm);
  border-radius: var(--ou-radius-md);
  padding: 20px;
  text-align: center;
}
.stat-val {
  font-family: var(--ou-font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--ou-text-heading);
}
.stat-label {
  font-size: 12px;
  color: var(--ou-text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Bar chart */
.bar-chart { margin-bottom: 24px; }
.bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 10px;
}
.bar-label {
  width: 100px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ou-text-strong);
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 22px;
  border-radius: var(--ou-radius-pill);
  box-shadow: var(--ou-neu-pressed-sm);
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: var(--ou-radius-pill);
  background: linear-gradient(135deg, rgba(0,0,0,0.12), rgba(0,0,0,0.22));
  transition: width 0.5s ease;
  position: relative;
}
.bar-fill.accent-fill {
  background: linear-gradient(135deg, var(--ou-accent), var(--ou-accent2));
}
.bar-count {
  width: 36px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ou-text-secondary);
  flex-shrink: 0;
}

/* Domain badges */
.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: var(--ou-radius-pill);
  font-size: 11px;
  font-weight: 600;
  margin: 2px 3px;
  box-shadow: var(--ou-neu-raised-xs);
  background: var(--ou-bg);
  color: var(--ou-text-strong);
}
.badge-schedule { color: rgba(0,0,0,0.7); }
.badge-finance { color: rgba(0,0,0,0.65); }
.badge-emotion { color: var(--ou-accent); }
.badge-task { color: rgba(0,0,0,0.72); }
.badge-idea { color: rgba(0,0,0,0.55); }
.badge-habit { color: rgba(0,0,0,0.6); }
.badge-knowledge { color: rgba(0,0,0,0.68); }
.badge-education { color: rgba(0,0,0,0.75); }
.badge-health { color: rgba(0,0,0,0.62); }
.badge-relationship { color: rgba(0,0,0,0.58); }
.badge-development { color: rgba(0,0,0,0.7); font-family: var(--ou-font-mono); }
.badge-media { color: rgba(0,0,0,0.52); }

/* Persona card */
.persona-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.persona-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  box-shadow: var(--ou-neu-raised-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  background: var(--ou-bg);
  flex-shrink: 0;
}
.persona-info h3 {
  font-family: var(--ou-font-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--ou-text-heading);
}
.persona-info p {
  font-size: 13px;
  color: var(--ou-text-secondary);
}

/* Chat bubble - member */
.chat-bubble {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-sm);
  border-radius: 18px 18px 4px 18px;
  padding: 12px 18px;
  margin-bottom: 8px;
  display: inline-block;
  max-width: 82%;
  font-size: 14.5px;
  color: var(--ou-text-heading);
  line-height: 1.5;
  word-break: break-word;
  align-self: flex-end;
}
.chat-bubble-wrap {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 4px;
}

/* Orb bubble */
.orb-bubble {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-pressed-md);
  border-radius: 18px 18px 18px 4px;
  padding: 12px 18px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--ou-text-body);
  align-self: flex-start;
  max-width: 82%;
  display: inline-block;
  margin-bottom: 4px;
}
.orb-bubble-wrap {
  display: flex;
  justify-content: flex-start;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 4px;
}
.orb-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  box-shadow: var(--ou-neu-raised-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--ou-bg);
  flex-shrink: 0;
  margin-top: 2px;
}
.orb-avatar svg {
  width: 14px; height: auto;
  fill: var(--ou-text-muted);
}

/* Inline view card */
.inline-view-card {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-pressed-sm);
  border-radius: var(--ou-radius-sm);
  padding: 10px 14px;
  margin: 8px 0 8px 32px;
  font-size: 12px;
  max-width: 80%;
}
.inline-view-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--ou-text-muted);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.inline-view-content {
  color: var(--ou-text-strong);
  font-size: 12px;
  line-height: 1.5;
}
.inline-view-content .iv-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
  border-bottom: 1px solid var(--ou-border-subtle);
}
.inline-view-content .iv-row:last-child { border-bottom: none; }
.inline-view-content .iv-key { color: var(--ou-text-muted); font-size: 11px; }
.inline-view-content .iv-val { color: var(--ou-text-heading); font-weight: 600; font-size: 12px; }

/* No response */
.no-response {
  font-size: 11px;
  color: var(--ou-text-disabled);
  font-style: italic;
  padding: 8px 0 8px 32px;
}

/* Sentence entry */
.sentence-entry { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--ou-border-subtle); }
.sentence-entry:last-child { border-bottom: none; }
.domains-row { margin: 8px 0; }
.extracted-data {
  margin-top: 10px;
  font-size: 12px;
  font-family: var(--ou-font-mono);
  color: var(--ou-text-secondary);
  overflow-x: auto;
}
.extracted-data table { width: 100%; border-collapse: collapse; }
.extracted-data th {
  text-align: left;
  padding: 4px 8px;
  font-weight: 600;
  color: var(--ou-text-strong);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.extracted-data td { padding: 4px 8px; font-size: 12px; }
.note {
  margin-top: 6px;
  font-size: 12px;
  color: var(--ou-text-muted);
  font-style: italic;
}

/* Domain summary */
.domain-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}

/* Ambiguous highlight */
.ambiguous { border-left: 3px solid var(--ou-accent); padding-left: 14px; }

/* Followup questions */
.followup {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.followup-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: var(--ou-radius-pill);
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-xs);
  white-space: nowrap;
}
.followup-tag.immediate {
  color: var(--ou-accent);
}
.followup-tag.later {
  color: var(--ou-text-muted);
}
.followup-text {
  font-size: 12px;
  color: var(--ou-text-secondary);
  font-style: italic;
}

/* Ambiguous scenario badges */
.classifiable-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: var(--ou-radius-pill);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  box-shadow: var(--ou-neu-raised-xs);
  background: var(--ou-bg);
}
.classifiable-badge.yes { color: var(--ou-text-strong); }
.classifiable-badge.no { color: var(--ou-accent); }
.classifiable-badge.partial { color: var(--ou-text-muted); }

.system-response {
  margin-top: 6px;
  font-size: 12px;
  color: var(--ou-text-secondary);
  padding: 8px 12px;
  border-radius: var(--ou-radius-sm);
  box-shadow: var(--ou-neu-pressed-sm);
  background: var(--ou-bg);
}
.system-response strong {
  color: var(--ou-text-strong);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* Responsive */
@media (max-width: 600px) {
  body { padding: 10px; }
  .card { padding: 18px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .chat-bubble { max-width: 95%; }
  .orb-bubble { max-width: 95%; }
  .bar-label { width: 70px; font-size: 11px; }
  .persona-header { gap: 10px; }
  .domain-summary-grid { grid-template-columns: 1fr; }
}

/* Nav */
.toc { margin-bottom: 16px; }
.toc a {
  display: inline-block;
  padding: 4px 14px;
  margin: 3px;
  border-radius: var(--ou-radius-pill);
  box-shadow: var(--ou-neu-raised-xs);
  background: var(--ou-bg);
  color: var(--ou-text-secondary);
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s;
}
.toc a:hover { color: var(--ou-accent); }

.collapse-btn {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-xs);
  border: none;
  border-radius: var(--ou-radius-pill);
  padding: 4px 14px;
  font-size: 12px;
  color: var(--ou-text-secondary);
  cursor: pointer;
  font-family: var(--ou-font-body);
  float: right;
}
.collapse-btn:hover { color: var(--ou-accent); }
.collapsible { transition: max-height 0.3s ease; overflow: hidden; }

/* Category label for ambiguous section */
.category-label {
  display: inline-block;
  padding: 3px 12px;
  border-radius: var(--ou-radius-pill);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  box-shadow: var(--ou-neu-raised-xs);
  background: var(--ou-bg);
  color: var(--ou-text-secondary);
  margin-bottom: 6px;
}

/* Date conversion inline */
.date-conv {
  font-size: 11px;
  color: var(--ou-text-muted);
  font-family: var(--ou-font-mono);
  margin-left: 4px;
}

/* Orb principles box */
.principles-box {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-pressed-sm);
  border-radius: var(--ou-radius-md);
  padding: 16px 20px;
  margin-bottom: 20px;
  font-size: 12px;
  line-height: 1.8;
  color: var(--ou-text-secondary);
}
.principles-box h4 {
  font-size: 13px;
  color: var(--ou-text-strong);
  margin-bottom: 8px;
  font-weight: 700;
}
.principles-box li {
  margin-left: 16px;
  margin-bottom: 2px;
}
</style>
</head>

// Helper: resolve relative dates to absolute
function resolveDate(relStr) {
  const base = new Date("2026-04-18");
  const s = relStr.trim();
  if (s === "내일") { const d = new Date(base); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
  if (s === "오늘") { return base.toISOString().slice(0,10); }
  if (s === "모레" || s === "모래") { const d = new Date(base); d.setDate(d.getDate()+2); return d.toISOString().slice(0,10); }
  if (s === "어제") { const d = new Date(base); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
  if (s === "주말" || s === "이번 주말" || s === "이번 주 토요일") {
    const d = new Date(base); const day = d.getDay(); const diff = 6 - day; d.setDate(d.getDate()+diff); return d.toISOString().slice(0,10);
  }
  if (s.includes("다음 주")) {
    const dayMap = {"월요일":1,"화요일":2,"수요일":3,"목요일":4,"금요일":5,"토요일":6,"일요일":0};
    for (const [name, dow] of Object.entries(dayMap)) {
      if (s.includes(name)) {
        const d = new Date(base);
        const curr = d.getDay();
        let diff = (dow - curr + 7) % 7 + 7;
        d.setDate(d.getDate() + diff);
        return d.toISOString().slice(0,10);
      }
    }
    const d = new Date(base); d.setDate(d.getDate()+7); return d.toISOString().slice(0,10) + " (approx)";
  }
  if (s === "이번 주") { return "2026-04-13~2026-04-19"; }
  if (s === "지난주") { return "2026-04-06~2026-04-12"; }
  if (s === "다음 달" || s === "다음달") { return "2026-05 (approx)"; }
  return null;
}

const root = document.getElementById('report-root');

// Compute stats
let totalSentences = 0;
const domainCounts = {};
let singleDomain = 0, multiDomain = 0;
const domainSentences = {};

Object.keys(DOMAINS).forEach(d => { domainCounts[d] = 0; domainSentences[d] = []; });

personas.forEach(p => {
  p.sentences.forEach(s => {
    totalSentences++;
    if (s.domains.length === 1) singleDomain++;
    else multiDomain++;
    s.domains.forEach(d => {
      domainCounts[d] = (domainCounts[d]||0) + 1;
      if (!domainSentences[d]) domainSentences[d] = [];
      domainSentences[d].push({persona: p.name, input: s.input, allDomains: s.domains});
    });
  });
});

const maxCount = Math.max(...Object.values(domainCounts));

function badge(d) {
  return `<span class="badge badge-${d}">${d}</span>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderExtracted(data) {
  let rows = '';
  Object.entries(data).forEach(([domain, obj]) => {
    Object.entries(obj).forEach(([k, v]) => {
      let val = typeof v === 'object' ? JSON.stringify(v, null, 0) : v;
      if (k === 'dateResolved') {
        rows += `<tr><td style="color:var(--ou-text-muted)">${domain}</td><td>${escHtml(String(k))}</td><td><span class="date-conv">${escHtml(String(val))}</span></td></tr>`;
        return;
      }
      if (k === 'date' && data[domain] && data[domain].dateResolved) {
        rows += `<tr><td style="color:var(--ou-text-muted)">${domain}</td><td>${escHtml(String(k))}</td><td>${escHtml(String(val))} <span class="date-conv">&rarr; ${escHtml(String(data[domain].dateResolved))}</span></td></tr>`;
        return;
      }
      rows += `<tr><td style="color:var(--ou-text-muted)">${domain}</td><td>${escHtml(String(k))}</td><td>${escHtml(String(val))}</td></tr>`;
    });
  });
  return `<div class="pressed-sm extracted-data"><table><thead><tr><th>Domain</th><th>Key</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderFollowup(followup) {
  if (!followup) return '';
  let html = '';
  if (followup.immediate) {
    html += `<div class="followup"><div class="followup-tag immediate">당장질문</div><div class="followup-text">"${escHtml(followup.immediate)}"</div></div>`;
  }
  if (followup.later) {
    html += `<div class="followup"><div class="followup-tag later">추가질문</div><div class="followup-text">"${escHtml(followup.later)}"</div></div>`;
  }
  return html;
}

function renderOrbReaction(orb) {
  if (!orb) return '<div class="no-response">(Orb 반응 데이터 없음)</div>';
  let html = '';
  if (orb.noResponse && !orb.text && !orb.inlineView) {
    html += '<div class="no-response">(무응답 -- 백그라운드 저장)</div>';
    return html;
  }
  if (orb.text) {
    html += `<div class="orb-bubble-wrap"><div class="orb-avatar">${ORB_SVG}</div><div class="orb-bubble">${escHtml(orb.text)}</div></div>`;
  }
  if (orb.inlineView) {
    html += `<div class="inline-view-card"><div class="inline-view-label">${escHtml(orb.inlineView.type)}</div><div class="inline-view-content">${escHtml(orb.inlineView.content)}</div></div>`;
  }
  if (!orb.text && !orb.inlineView && !orb.noResponse) {
    html += '<div class="no-response">(무응답 -- 백그라운드 저장)</div>';
  }
  return html;
}

      || (s.domains.includes('emotion') && s.domains.includes('health') && s.domains.length === 2);
    if (isAmb) ambiguous.push({persona: p.name, ...s});
  });
});
