<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    rect { fill: #060810; }
    text { fill: rgba(255,255,255,0.9); }
    @media (prefers-color-scheme: light) {
      rect { fill: #f0f0f4; }
      text { fill: rgba(0,0,0,0.85); }
    }
  </style>
  <rect width="32" height="32" rx="6"/>
  <text x="16" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" filter="url(#glow)">O</text>
</svg>
