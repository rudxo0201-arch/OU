<body>

<div id="ui">
    <h1>NEURAL COSMOS</h1>
    <p>Drag nodes to interact | Scroll to zoom</p>
</div>

<canvas id="glcanvas"></canvas>

<script id="node-vs" type="x-shader/x-vertex">
    attribute vec2 a_quadPos;   // Quad vertex (-0.5 to 0.5)
    attribute vec3 a_nodePos;   // Instance data: [x, y, z]
    attribute float a_nodeAlpha; // Instance data: alpha
    attribute float a_nodeSize;  // Instance data: size

    uniform mat4 u_mvp;
    uniform vec2 u_screenRes;

    varying float v_alpha;
    varying vec2 v_uv;

    void main() {
        v_alpha = a_nodeAlpha;
        v_uv = a_quadPos * 2.0; // UV from -1.0 to 1.0

        // Billboarding: Make quad face camera
        vec4 viewPos = u_mvp * vec4(a_nodePos, 1.0);
        
        // Screen-space sizing based on distance and uniform size
        float dist = length(viewPos.xyz);
        float screenSize = a_nodeSize * (viewPos.w * 0.012 / u_screenRes.x) / dist; 
        
        viewPos.xy += a_quadPos * screenSize;

        gl_Position = viewPos;
    }
</script>

<script id="node-fs" type="x-shader/x-fragment">
    precision highp float;
    varying float v_alpha;
    varying vec2 v_uv;

    void main() {
        float d = length(v_uv);
        if(d > 1.0) discard; // Circular mask

        // Soft radial glow for nodes
        float radialGlow = 1.0 - d;
        radialGlow = pow(radialGlow, 3.0);

        // Core brightening
        float core = 1.0 - d;
        core = pow(core, 15.0);

        // White core with soft blue glow
        vec3 col = vec3( radialGlow * 0.1, radialGlow * 0.5, radialGlow * 1.0 ) + vec3(core); 

        gl_FragColor = vec4(col, v_alpha * radialGlow);
    }
</script>

<script id="edge-vs" type="x-shader/x-vertex">
    attribute vec3 a_pos;
    attribute float a_alpha;
    attribute float a_edgeType; // 0: static line, 1: pulsed signal

    uniform mat4 u_mvp;
    uniform float u_time;

    varying float v_alpha;
    varying float v_edgeType;
    varying float v_pulse;

    void main() {
        v_alpha = a_alpha;
        v_edgeType = a_edgeType;

        if (a_edgeType > 0.5) {
            // Pulsing logic along the line
            float t = u_time * 2.0; // Pulse speed
            v_pulse = mod(t + a_alpha * 10.0, 1.0); // Create varied pulses
        }

        gl_Position = u_mvp * vec4(a_pos, 1.0);
    }
</script>

<script id="edge-fs" type="x-shader/x-fragment">
    precision highp float;
    varying float v_alpha;
    varying float v_edgeType;
    varying float v_pulse;

    void main() {
        if (v_edgeType < 0.5) {
            // Static edge: faint blue line
            gl_FragColor = vec4(0.0, 0.3, 0.6, v_alpha * 0.15);
        } else {
            // Pulsed edge: Neon blue signal traveling
            float signal = 1.0 - abs(v_pulse - 0.5) * 2.0; // Tri-pulse shape
            signal = pow(signal, 5.0); // Sharp pulse

            vec3 signalCol = vec3(0.0, 0.8, 1.0); // Neon Blue
            gl_FragColor = vec4(signalCol * signal, v_alpha * signal * 0.8);
        }
    }
</script>
