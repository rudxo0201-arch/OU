<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OU PDF 템플릿 프리셋 미리보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e8e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px 20px;
    font-family: 'Pretendard Variable', sans-serif;
  }
  .label {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    letter-spacing: 0.05em;
    margin-bottom: -28px;
  }
  .a4 {
    width: 794px;
    height: 1123px;
    background: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
  }
  .content-area { position: absolute; overflow: hidden; }
  .footer { position: absolute; display: flex; align-items: flex-start; padding-top: 6px; }
  .header { position: absolute; display: flex; align-items: flex-end; padding-bottom: 6px; }

  /* 샘플 텍스트 */
  .sample-body { white-space: pre-wrap; }
</style>
</head>
<body>

<script>
const sampleTitle = 'OU — 개인 데이터 우주 플랫폼';
const sampleSubtitle = 'LLM과의 대화를 자동으로 구조화하고, 어떤 형태로든 꺼내 쓸 수 있는 플랫폼';
const sampleHeading1 = '1. 문제 인식 — 데이터는 넘치는데, 구조가 없다';
const sampleHeading2 = '2. OU의 해법 — 대화가 곧 데이터베이스';
const sampleBody1 = '사람들은 이미 ChatGPT, Claude 같은 LLM을 매일 쓴다. 일정을 물어보고, 아이디어를 정리하고, 업무를 논의한다. 그런데 이 대화는 좌측 패널에 시간순으로 쌓일 뿐이다. 3주 전에 AI랑 나눈 사업 아이디어가 뭐였는지 못 찾고, 지난달에 정리한 독서 노트를 스크롤해서 뒤져야 한다. 노션이나 옵시디언에 옮겨도 텍스트 더미일 뿐, 관계가 없다.';
const sampleBody2 = '핵심 문제는 명확하다. 비정형 데이터가 구조화되지 않으면, 양이 아무리 많아도 자산이 아니다. 파일과 폴더는 컴퓨터의 한계를 인간에게 떠넘긴 것이다. 사람의 뇌에는 파일이 없다. 약속에서 그 사람으로, 지난번 대화에서 거기서 나온 아이디어로 — 이것이 하나의 네트워크로 연결되어 있다.';
const sampleBody3 = 'OU에서는 사용자가 채팅창에 입력하기만 하면 된다. "다음주 일요일 희민이 결혼식"이라고 말하면 캘린더에 일정이 생성되고, "커피 5000원"이라고 하면 가계부에 지출이 기록된다. 입력은 자연어, 저장은 그래프 데이터베이스. 도메인 분류는 정규식 기반으로 LLM 호출 없이 비용 0으로 처리된다.';
const date = '2026년 4월';

const templates = [
  {
    id: 'minimal', name: '미니멀',
    margin: [35,35,35,35], // top, right, bottom, left (mm)
    headingFont: "'Pretendard Variable', sans-serif",
    bodyFont: "'Pretendard Variable', sans-serif",
    titleSize: 20, titleWeight: 300, titleLetterSpacing: '0.1em', titleAlign: 'center',
    headingSize: 14, headingWeight: 400, headingLetterSpacing: '0.06em',
    bodySize: 12, bodyLineHeight: 2.0, bodyAlign: 'left',
    pageNumPos: 'center', pageNumSize: 8, pageNumColor: '#bbb',
    showHeader: false, headerDivider: false,
    dropCap: false, firstIndent: 0,
    sectionDivider: 'space',
    headingDecor: 'none',
  },
  {
    id: 'academic', name: '논문',
    margin: [25,30,25,30],
    headingFont: "'Noto Serif KR', serif",
    bodyFont: "'Pretendard Variable', sans-serif",
    titleSize: 24, titleWeight: 700, titleLetterSpacing: '-0.01em', titleAlign: 'center',
    headingSize: 16, headingWeight: 600, headingLetterSpacing: '-0.01em',
    bodySize: 12, bodyLineHeight: 1.8, bodyAlign: 'justify',
    pageNumPos: 'center', pageNumSize: 10, pageNumColor: '#666',
    showHeader: true, headerDivider: true, headerText: sampleTitle,
    dropCap: false, firstIndent: 24,
    sectionDivider: 'dots',
    headingDecor: 'none',
  },
  {
    id: 'magazine', name: '매거진',
    margin: [20,15,20,15],
    headingFont: "'Pretendard Variable', sans-serif",
    bodyFont: "'Noto Serif KR', serif",
    titleSize: 32, titleWeight: 700, titleLetterSpacing: '-0.03em', titleAlign: 'left',
    headingSize: 18, headingWeight: 700, headingLetterSpacing: '-0.02em',
    bodySize: 11, bodyLineHeight: 1.7, bodyAlign: 'justify',
    pageNumPos: 'right', pageNumSize: 9, pageNumColor: '#888',
    showHeader: true, headerDivider: true, headerText: '문제 인식',
    dropCap: true, firstIndent: 0,
    columns: 2, columnGap: 30,
    sectionDivider: 'line',
    headingDecor: 'none',
  },
  {
    id: 'report', name: '보고서',
    margin: [25,25,25,25],
    headingFont: "'Pretendard Variable', sans-serif",
    bodyFont: "'Pretendard Variable', sans-serif",
    titleSize: 22, titleWeight: 600, titleLetterSpacing: '-0.01em', titleAlign: 'left',
    headingSize: 15, headingWeight: 600, headingLetterSpacing: '0',
    bodySize: 12, bodyLineHeight: 1.7, bodyAlign: 'left',
    pageNumPos: 'right', pageNumSize: 9, pageNumColor: '#888',
    showHeader: true, headerDivider: true, headerText: sampleTitle,
    dropCap: false, firstIndent: 0,
    sectionDivider: 'line',
    headingDecor: 'bar',
  },
  {
    id: 'textbook', name: '교재',
    margin: [20,20,25,25],
    headingFont: "'Pretendard Variable', sans-serif",
    bodyFont: "'Pretendard Variable', sans-serif",
    titleSize: 26, titleWeight: 700, titleLetterSpacing: '-0.01em', titleAlign: 'left',
    headingSize: 16, headingWeight: 700, headingLetterSpacing: '0',
    bodySize: 13, bodyLineHeight: 1.8, bodyAlign: 'left',
    pageNumPos: 'right', pageNumSize: 10, pageNumColor: '#555',
    showHeader: true, headerDivider: false, headerText: '제 1장 문제 인식',
    dropCap: false, firstIndent: 0,
    sectionDivider: 'line',
    headingDecor: 'band',
  },
  {
    id: 'literary', name: '문학',
    margin: [30,30,35,30],
    headingFont: "'Noto Serif KR', serif",
    bodyFont: "'Noto Serif KR', serif",
    titleSize: 20, titleWeight: 600, titleLetterSpacing: '0.02em', titleAlign: 'center',
    headingSize: 15, headingWeight: 600, headingLetterSpacing: '0.01em',
    bodySize: 13, bodyLineHeight: 2.0, bodyAlign: 'justify',
    pageNumPos: 'center', pageNumSize: 10, pageNumColor: '#aaa',
    showHeader: false, headerDivider: false,
    dropCap: true, firstIndent: 28,
    sectionDivider: 'ornament',
    headingDecor: 'none',
  },
];

const MM = 3.7795; // mm to px

templates.forEach(t => {
  // Label
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = `${t.name} (${t.id})`;
  document.body.appendChild(label);

  const page = document.createElement('div');
  page.className = 'a4';
  document.body.appendChild(page);

  const mt = t.margin[0] * MM;
  const mr = t.margin[1] * MM;
  const mb = t.margin[2] * MM;
  const ml = t.margin[3] * MM;
  const headerH = t.showHeader ? 28 : 0;
  const footerH = 28;

  // Header
  if (t.showHeader) {
    const header = document.createElement('div');
    header.className = 'header';
    header.style.cssText = `top:${mt-4}px; left:${ml}px; right:${mr}px; height:${headerH}px;
      ${t.headerDivider ? 'border-bottom: 0.5px solid #ddd;' : ''}`;
    header.innerHTML = `<span style="font-family:${t.bodyFont}; font-size:8px; color:#999; letter-spacing:0.08em;">${t.headerText||''}</span>`;
    page.appendChild(header);
  }

  // Footer
  const footer = document.createElement('div');
  footer.className = 'footer';
  const justifyFooter = t.pageNumPos === 'center' ? 'center' : 'flex-end';
  footer.style.cssText = `bottom:${mb-4}px; left:${ml}px; right:${mr}px; height:${footerH}px; justify-content:${justifyFooter};`;
  footer.innerHTML = `<span style="font-family:${t.bodyFont}; font-size:${t.pageNumSize}px; color:${t.pageNumColor};">1</span>`;
  page.appendChild(footer);

  // Content area
  const content = document.createElement('div');
  content.className = 'content-area';
  const contentTop = mt + headerH;
  const contentH = 1123 - mt - mb - headerH - footerH;
  content.style.cssText = `top:${contentTop}px; left:${ml}px; right:${mr}px; height:${contentH}px;
    ${t.columns === 2 ? `column-count:2; column-gap:${t.columnGap}px;` : ''}`;
  page.appendChild(content);

  // Section heading 1
  let headingHTML = '';
  if (t.headingDecor === 'bar') {
    headingHTML = `<div style="margin-top:0; margin-bottom:12px; border-left:4px solid #333; padding-left:12px;">
      <div style="font-family:${t.headingFont}; font-size:${t.headingSize}px; font-weight:${t.headingWeight}; letter-spacing:${t.headingLetterSpacing}; color:#111; line-height:1.4;">${sampleHeading1}</div>
    </div>`;
  } else if (t.headingDecor === 'band') {
    headingHTML = `<div style="margin-top:0; margin-bottom:14px; background:#f0f0f0; padding:8px 12px; border-radius:2px;">
      <div style="font-family:${t.headingFont}; font-size:${t.headingSize}px; font-weight:${t.headingWeight}; letter-spacing:${t.headingLetterSpacing}; color:#111; line-height:1.4;">${sampleHeading1}</div>
    </div>`;
  } else {
    headingHTML = `<div style="margin-top:0; margin-bottom:12px;">
      <div style="font-family:${t.headingFont}; font-size:${t.headingSize}px; font-weight:${t.headingWeight}; letter-spacing:${t.headingLetterSpacing}; color:#111; line-height:1.5;">${sampleHeading1}</div>
    </div>`;
  }

  // Body paragraphs
  const indent = t.firstIndent;
  let bodyHTML = '';

  // First paragraph (possibly with drop cap)
  if (t.dropCap) {
    const firstChar = sampleBody1[0];
    const rest = sampleBody1.slice(1);
    const lineH = t.bodySize * t.bodyLineHeight;
    const dropSize = lineH * 3 * 0.85;
    bodyHTML += `<p style="font-family:${t.bodyFont}; font-size:${t.bodySize}px; line-height:${t.bodyLineHeight}; text-align:${t.bodyAlign}; color:#1a1a1a; margin:0 0 ${t.columns?8:16}px 0; overflow:hidden;">
      <span style="float:left; font-family:${t.headingFont}; font-size:${dropSize}px; line-height:1; font-weight:700; color:#111; padding-right:6px; padding-top:4px; margin-top:-2px;">${firstChar}</span>${rest}
    </p>`;
  } else {
    bodyHTML += `<p style="font-family:${t.bodyFont}; font-size:${t.bodySize}px; line-height:${t.bodyLineHeight}; text-align:${t.bodyAlign}; color:#1a1a1a; margin:0 0 ${t.columns?8:16}px 0;">${sampleBody1}</p>`;
  }

  bodyHTML += `<p style="font-family:${t.bodyFont}; font-size:${t.bodySize}px; line-height:${t.bodyLineHeight}; text-align:${t.bodyAlign}; color:#1a1a1a; margin:0 0 ${t.columns?8:16}px 0; text-indent:${indent}px;">${sampleBody2}</p>`;

  // Section divider
  if (t.sectionDivider === 'dots') {
    bodyHTML += `<div style="text-align:center; margin:20px 0; color:#ccc; letter-spacing:0.5em; font-size:12px;">· · ·</div>`;
  } else if (t.sectionDivider === 'line') {
    bodyHTML += `<div style="margin:20px 0; border-bottom:0.5px solid #ddd;"></div>`;
  } else if (t.sectionDivider === 'ornament') {
    bodyHTML += `<div style="text-align:center; margin:24px 0; color:#bbb; font-size:14px; letter-spacing:0.3em;">✦ ✦ ✦</div>`;
  } else if (t.sectionDivider === 'space') {
    bodyHTML += `<div style="margin:32px 0;"></div>`;
  }

  // Section heading 2
  let heading2HTML = '';
  if (t.headingDecor === 'bar') {
    heading2HTML = `<div style="margin-top:8px; margin-bottom:12px; border-left:4px solid #333; padding-left:12px;">
      <div style="font-family:${t.headingFont}; font-size:${t.headingSize}px; font-weight:${t.headingWeight}; letter-spacing:${t.headingLetterSpacing}; color:#111; line-height:1.4;">${sampleHeading2}</div>
    </div>`;
  } else if (t.headingDecor === 'band') {
    heading2HTML = `<div style="margin-top:8px; margin-bottom:14px; background:#f0f0f0; padding:8px 12px; border-radius:2px;">
      <div style="font-family:${t.headingFont}; font-size:${t.headingSize}px; font-weight:${t.headingWeight}; letter-spacing:${t.headingLetterSpacing}; color:#111; line-height:1.4;">${sampleHeading2}</div>
    </div>`;
  } else {
    heading2HTML = `<div style="margin-top:24px; margin-bottom:12px;">
      <div style="font-family:${t.headingFont}; font-size:${t.headingSize}px; font-weight:${t.headingWeight}; letter-spacing:${t.headingLetterSpacing}; color:#111; line-height:1.5;">${sampleHeading2}</div>
    </div>`;
  }

  // Second drop cap for literary
  let body3HTML = '';
  if (t.dropCap) {
    const firstChar = sampleBody3[0];
    const rest = sampleBody3.slice(1);
    const lineH = t.bodySize * t.bodyLineHeight;
    const dropSize = lineH * 3 * 0.85;
    body3HTML = `<p style="font-family:${t.bodyFont}; font-size:${t.bodySize}px; line-height:${t.bodyLineHeight}; text-align:${t.bodyAlign}; color:#1a1a1a; margin:0 0 ${t.columns?8:16}px 0; overflow:hidden;">
      <span style="float:left; font-family:${t.headingFont}; font-size:${dropSize}px; line-height:1; font-weight:700; color:#111; padding-right:6px; padding-top:4px; margin-top:-2px;">${firstChar}</span>${rest}
    </p>`;
  } else {
    body3HTML = `<p style="font-family:${t.bodyFont}; font-size:${t.bodySize}px; line-height:${t.bodyLineHeight}; text-align:${t.bodyAlign}; color:#1a1a1a; margin:0 0 ${t.columns?8:16}px 0;">${sampleBody3}</p>`;
  }

  content.innerHTML = headingHTML + bodyHTML + heading2HTML + body3HTML;
});
</script>
</body>
</html>
