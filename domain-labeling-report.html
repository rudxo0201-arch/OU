<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OU Domain Labeling Report</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=DM+Sans:wght@400;500;700&family=Pretendard+Variable:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --ou-bg: #e8ecf1;
  --ou-shadow-dark: rgba(163,177,198,0.6);
  --ou-shadow-light: rgba(255,255,255,0.6);
  --ou-text-body: rgba(0,0,0,0.58);
  --ou-text-strong: rgba(0,0,0,0.76);
  --ou-text-heading: rgba(0,0,0,0.88);
  --ou-text-muted: rgba(0,0,0,0.32);
  --ou-text-secondary: rgba(0,0,0,0.48);
  --ou-text-disabled: rgba(0,0,0,0.18);
  --ou-border-subtle: rgba(0,0,0,0.05);
  --ou-accent: #e8976b;
  --ou-accent2: #f5c16c;
  --ou-neu-raised-xs: 2px 2px 4px var(--ou-shadow-dark), -2px -2px 4px var(--ou-shadow-light);
  --ou-neu-raised-sm: 3px 3px 6px var(--ou-shadow-dark), -3px -3px 6px var(--ou-shadow-light);
  --ou-neu-raised-md: 6px 6px 12px var(--ou-shadow-dark), -6px -6px 12px var(--ou-shadow-light);
  --ou-neu-raised-lg: 10px 10px 20px var(--ou-shadow-dark), -10px -10px 20px var(--ou-shadow-light);
  --ou-neu-pressed-sm: inset 2px 2px 5px var(--ou-shadow-dark), inset -2px -2px 5px var(--ou-shadow-light);
  --ou-neu-pressed-md: inset 4px 4px 8px var(--ou-shadow-dark), inset -4px -4px 8px var(--ou-shadow-light);
  --ou-radius-pill: 999px;
  --ou-radius-lg: 20px;
  --ou-radius-md: 12px;
  --ou-radius-sm: 8px;
  --ou-radius-xs: 4px;
  --ou-font-logo: 'Orbitron', sans-serif;
  --ou-font-display: 'DM Sans', sans-serif;
  --ou-font-body: 'Pretendard Variable', 'DM Sans', -apple-system, system-ui, sans-serif;
  --ou-font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--ou-bg);
  font-family: var(--ou-font-body);
  color: var(--ou-text-body);
  line-height: 1.6;
  padding: 20px;
}
.container { max-width: 1100px; margin: 0 auto; }

/* Logo */
.logo-wrap { text-align:center; margin-bottom: 8px; }
.logo-wrap svg { width: 80px; height: auto; fill: var(--ou-text-heading); }
.report-title {
  text-align: center;
  font-family: var(--ou-font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--ou-text-heading);
  margin-bottom: 6px;
}
.report-sub {
  text-align: center;
  font-size: 14px;
  color: var(--ou-text-secondary);
  margin-bottom: 40px;
}

/* Neu cards */
.card {
  background: var(--ou-bg);
  border-radius: var(--ou-radius-lg);
  box-shadow: var(--ou-neu-raised-md);
  padding: 28px;
  margin-bottom: 24px;
}
.card-sm {
  background: var(--ou-bg);
  border-radius: var(--ou-radius-md);
  box-shadow: var(--ou-neu-raised-sm);
  padding: 18px;
  margin-bottom: 16px;
}
.pressed {
  box-shadow: var(--ou-neu-pressed-md);
  border-radius: var(--ou-radius-md);
  padding: 14px;
  background: var(--ou-bg);
}
.pressed-sm {
  box-shadow: var(--ou-neu-pressed-sm);
  border-radius: var(--ou-radius-sm);
  padding: 10px 14px;
  background: var(--ou-bg);
}

/* Section titles */
.section-title {
  font-family: var(--ou-font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--ou-text-heading);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-xs);
  font-size: 14px;
  font-weight: 700;
  color: var(--ou-accent);
}

/* Summary stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-sm);
  border-radius: var(--ou-radius-md);
  padding: 20px;
  text-align: center;
}
.stat-val {
  font-family: var(--ou-font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--ou-text-heading);
}
.stat-label {
  font-size: 12px;
  color: var(--ou-text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Bar chart */
.bar-chart { margin-bottom: 24px; }
.bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 10px;
}
.bar-label {
  width: 100px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ou-text-strong);
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 22px;
  border-radius: var(--ou-radius-pill);
  box-shadow: var(--ou-neu-pressed-sm);
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: var(--ou-radius-pill);
  background: linear-gradient(135deg, rgba(0,0,0,0.12), rgba(0,0,0,0.22));
  transition: width 0.5s ease;
  position: relative;
}
.bar-fill.accent-fill {
  background: linear-gradient(135deg, var(--ou-accent), var(--ou-accent2));
}
.bar-count {
  width: 36px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ou-text-secondary);
  flex-shrink: 0;
}

/* Domain badges */
.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: var(--ou-radius-pill);
  font-size: 11px;
  font-weight: 600;
  margin: 2px 3px;
  box-shadow: var(--ou-neu-raised-xs);
  background: var(--ou-bg);
  color: var(--ou-text-strong);
}
.badge-schedule { color: rgba(0,0,0,0.7); }
.badge-finance { color: rgba(0,0,0,0.65); }
.badge-emotion { color: var(--ou-accent); }
.badge-task { color: rgba(0,0,0,0.72); }
.badge-idea { color: rgba(0,0,0,0.55); }
.badge-habit { color: rgba(0,0,0,0.6); }
.badge-knowledge { color: rgba(0,0,0,0.68); }
.badge-education { color: rgba(0,0,0,0.75); }
.badge-health { color: rgba(0,0,0,0.62); }
.badge-relationship { color: rgba(0,0,0,0.58); }
.badge-development { color: rgba(0,0,0,0.7); font-family: var(--ou-font-mono); }
.badge-media { color: rgba(0,0,0,0.52); }

/* Persona card */
.persona-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.persona-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  box-shadow: var(--ou-neu-raised-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  background: var(--ou-bg);
  flex-shrink: 0;
}
.persona-info h3 {
  font-family: var(--ou-font-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--ou-text-heading);
}
.persona-info p {
  font-size: 13px;
  color: var(--ou-text-secondary);
}

/* Chat bubble */
.chat-bubble {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-sm);
  border-radius: 18px 18px 18px 4px;
  padding: 12px 18px;
  margin-bottom: 8px;
  display: inline-block;
  max-width: 85%;
  font-size: 14.5px;
  color: var(--ou-text-heading);
  line-height: 1.5;
  word-break: break-word;
}

/* Sentence entry */
.sentence-entry { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--ou-border-subtle); }
.sentence-entry:last-child { border-bottom: none; }
.domains-row { margin: 8px 0; }
.extracted-data {
  margin-top: 10px;
  font-size: 12px;
  font-family: var(--ou-font-mono);
  color: var(--ou-text-secondary);
  overflow-x: auto;
}
.extracted-data table { width: 100%; border-collapse: collapse; }
.extracted-data th {
  text-align: left;
  padding: 4px 8px;
  font-weight: 600;
  color: var(--ou-text-strong);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.extracted-data td { padding: 4px 8px; font-size: 12px; }
.note {
  margin-top: 6px;
  font-size: 12px;
  color: var(--ou-text-muted);
  font-style: italic;
}

/* Domain summary */
.domain-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}

/* Ambiguous highlight */
.ambiguous { border-left: 3px solid var(--ou-accent); padding-left: 14px; }

/* Responsive */
@media (max-width: 600px) {
  body { padding: 10px; }
  .card { padding: 18px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .chat-bubble { max-width: 95%; }
  .bar-label { width: 70px; font-size: 11px; }
  .persona-header { gap: 10px; }
  .domain-summary-grid { grid-template-columns: 1fr; }
}

/* Nav */
.toc { margin-bottom: 16px; }
.toc a {
  display: inline-block;
  padding: 4px 14px;
  margin: 3px;
  border-radius: var(--ou-radius-pill);
  box-shadow: var(--ou-neu-raised-xs);
  background: var(--ou-bg);
  color: var(--ou-text-secondary);
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.2s;
}
.toc a:hover { color: var(--ou-accent); }

.collapse-btn {
  background: var(--ou-bg);
  box-shadow: var(--ou-neu-raised-xs);
  border: none;
  border-radius: var(--ou-radius-pill);
  padding: 4px 14px;
  font-size: 12px;
  color: var(--ou-text-secondary);
  cursor: pointer;
  font-family: var(--ou-font-body);
  float: right;
}
.collapse-btn:hover { color: var(--ou-accent); }
.collapsible { transition: max-height 0.3s ease; overflow: hidden; }
</style>
</head>

    {input:"아들 대학 등록금도 내야 하는데 여유가 없어",domains:["finance","education","emotion","relationship"],data:{finance:{category:"등록금",constraint:"자금 부족"},education:{context:"아들 대학"},emotion:{mood:"burdened",intensity:"very_high"},relationship:{person:"아들"}},note:"4개 도메인"},
    {input:"이것만 넘기면 괜찮아질 거야 버텨야지",domains:["emotion"],data:{emotion:{mood:"determined_hopeful",intensity:"high"}},note:""}
  ]
}
];

// ============================================================
// RENDER
// ============================================================
const root = document.getElementById('report-root');

// Compute stats
let totalSentences = 0;
const domainCounts = {};
let singleDomain = 0, multiDomain = 0;
const domainSentences = {};

Object.keys(DOMAINS).forEach(d => { domainCounts[d] = 0; domainSentences[d] = []; });

personas.forEach(p => {
  p.sentences.forEach(s => {
    totalSentences++;
    if (s.domains.length === 1) singleDomain++;
    else multiDomain++;
    s.domains.forEach(d => {
      domainCounts[d] = (domainCounts[d]||0) + 1;
      if (!domainSentences[d]) domainSentences[d] = [];
      domainSentences[d].push({persona: p.name, input: s.input, allDomains: s.domains});
    });
  });
});

const maxCount = Math.max(...Object.values(domainCounts));

function badge(d) {
  return `<span class="badge badge-${d}">${d}</span>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderExtracted(data) {
  let rows = '';
  Object.entries(data).forEach(([domain, obj]) => {
    Object.entries(obj).forEach(([k, v]) => {
      const val = typeof v === 'object' ? JSON.stringify(v, null, 0) : v;
      rows += `<tr><td style="color:var(--ou-text-muted)">${domain}</td><td>${escHtml(String(k))}</td><td>${escHtml(String(val))}</td></tr>`;
    });
  });
  return `<div class="pressed-sm extracted-data"><table><thead><tr><th>Domain</th><th>Key</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ---- Section 1: Summary ----
let html = `
<div class="card">
  <div class="section-title"><span class="num">1</span> Summary</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${totalSentences}</div><div class="stat-label">Total Sentences</div></div>
    <div class="stat-card"><div class="stat-val">${personas.length}</div><div class="stat-label">Personas</div></div>
    <div class="stat-card"><div class="stat-val">${Object.keys(DOMAINS).length}</div><div class="stat-label">Domains</div></div>
    <div class="stat-card"><div class="stat-val">${singleDomain}</div><div class="stat-label">Single Domain</div></div>
    <div class="stat-card"><div class="stat-val">${multiDomain}</div><div class="stat-label">Multi Domain</div></div>
    <div class="stat-card"><div class="stat-val">${(multiDomain / totalSentences * 100).toFixed(0)}%</div><div class="stat-label">Multi Rate</div></div>
  </div>
  <h4 style="color:var(--ou-text-strong);margin-bottom:12px;font-size:14px;">Domain Frequency</h4>
  <div class="bar-chart">
    ${Object.entries(domainCounts).sort((a,b)=>b[1]-a[1]).map(([d,c]) => `
      <div class="bar-row">
        <div class="bar-label">${d}</div>
        <div class="bar-track"><div class="bar-fill${d==='emotion'?' accent-fill':''}" style="width:${(c/maxCount*100).toFixed(1)}%"></div></div>
        <div class="bar-count">${c}</div>
      </div>
    `).join('')}
  </div>
</div>
`;

// ---- Section 2: Personas ----
html += `<div class="card"><div class="section-title"><span class="num">2</span> Personas</div>`;
html += `<div class="toc">${personas.map(p => `<a href="#p-${p.id}">${p.emoji} ${p.name}</a>`).join('')}</div></div>`;

personas.forEach(p => {
  html += `
  <div class="card" id="p-${p.id}">
    <div class="persona-header">
      <div class="persona-avatar">${p.emoji}</div>
      <div class="persona-info">
        <h3>${p.name} <span style="font-weight:400;font-size:13px;color:var(--ou-text-secondary)">${p.role} / ${p.age}세</span></h3>
        <p>${p.traits}</p>
      </div>
    </div>
    ${p.sentences.map((s, i) => `
      <div class="sentence-entry${s.note && s.note.includes('모호') ? ' ambiguous' : ''}">
        <div class="chat-bubble">${escHtml(s.input)}</div>
        <div class="domains-row">${s.domains.map(d => badge(d)).join('')}</div>
        ${renderExtracted(s.data)}
        ${s.note ? `<div class="note">${escHtml(s.note)}</div>` : ''}
      </div>
    `).join('')}
  </div>`;
});

// ---- Section 3: Domain Summary ----
html += `<div class="card"><div class="section-title"><span class="num">3</span> Domain Summary</div>`;
html += `<div class="domain-summary-grid">`;
Object.entries(domainCounts).sort((a,b)=>b[1]-a[1]).forEach(([d, c]) => {
  const samples = domainSentences[d].slice(0, 5);
  html += `
  <div class="card-sm">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      ${badge(d)}
      <span style="font-size:13px;color:var(--ou-text-secondary);font-weight:600">${c} sentences</span>
    </div>
    <div style="font-size:11px;color:var(--ou-text-muted);margin-bottom:6px">${DOMAINS[d]}</div>
    ${samples.map(s => `<div style="font-size:12px;color:var(--ou-text-body);margin-bottom:4px;padding-left:8px;border-left:2px solid var(--ou-border-subtle)">
      <b>${s.persona}</b>: ${escHtml(s.input.length > 40 ? s.input.slice(0,40)+'...' : s.input)}
      ${s.allDomains.length > 1 ? `<span style="color:var(--ou-text-muted)"> +${s.allDomains.filter(x=>x!==d).join(', ')}</span>` : ''}
    </div>`).join('')}
  </div>`;
});
html += `</div></div>`;

// ---- Section 4: Ambiguous Cases ----
const ambiguous = [];
personas.forEach(p => {
  p.sentences.forEach(s => {
    const isAmb = (s.note && (s.note.includes('모호') || s.note.includes('경계') || s.note.includes('맥락 의존')))
      || s.domains.length >= 4
      || (s.domains.includes('emotion') && s.domains.includes('health') && s.domains.length === 2);
    if (isAmb) ambiguous.push({persona: p.name, ...s});
  });
});

html += `
<div class="card">
  <div class="section-title"><span class="num">4</span> Ambiguous Cases <span style="font-size:13px;font-weight:400;color:var(--ou-text-muted);margin-left:8px">${ambiguous.length} cases</span></div>
  <p style="font-size:13px;color:var(--ou-text-secondary);margin-bottom:16px;">Classification boundary is unclear. Requires human review or additional context.</p>
  ${ambiguous.map(s => `
    <div class="sentence-entry ambiguous">
      <div style="font-size:11px;color:var(--ou-text-muted);margin-bottom:4px">${escHtml(s.persona)}</div>
      <div class="chat-bubble">${escHtml(s.input)}</div>
      <div class="domains-row">${s.domains.map(d => badge(d)).join('')}</div>
      ${s.note ? `<div class="note" style="color:var(--ou-accent)">${escHtml(s.note)}</div>` : ''}
    </div>
  `).join('')}
</div>
`;

// ---- Footer ----
html += `
<div style="text-align:center;padding:40px 0 20px;font-size:12px;color:var(--ou-text-disabled)">
  <svg viewBox="0 0 193 92" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:40px;fill:var(--ou-text-disabled);margin-bottom:8px;display:block;margin-left:auto;margin-right:auto">
    <circle cx="146.5" cy="39.66" r="11.5"/>
    <path d="M92 7.79883V84.2012L84.2012 92H7.79883L0 84.2012V7.79883L7.79883 0H84.2012L92 7.79883ZM18 14C15.7909 14 14 15.7909 14 18V74C14 76.2091 15.7909 78 18 78H74C76.2091 78 78 76.2091 78 74V18C78 15.7909 76.2091 14 74 14H18Z"/>
    <path d="M115 74C115 76.2091 116.791 78 119 78H175C177.209 78 179 76.2091 179 74V0H193V84.2012L185.201 92H108.799L101 84.2012V0H115V74Z"/>
  </svg>
  OU Domain Labeling Report &middot; ${totalSentences} sentences &middot; ${personas.length} personas &middot; ${Object.keys(DOMAINS).length} domains
</div>
`;

root.innerHTML = html;
</script>
</body>
</html>
