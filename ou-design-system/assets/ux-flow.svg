  <rect x="1448" y="727" width="144" height="46" rx="6" fill="#302010" stroke="#706030" stroke-width="1.5"/>
  <text x="1520" y="745" fill="#e0c060" font-size="10" font-weight="600" text-anchor="middle">/admin</text>
  <text x="1520" y="763" fill="#908040" font-size="9" text-anchor="middle">관리자 패널</text>

  <!-- 유저관리: center(1685,738) rect(1607,725,116,26) -->
  <rect x="1607" y="725" width="116" height="26" rx="5" fill="#281808" stroke="#504020" stroke-width="1"/>
  <text x="1665" y="742" fill="#c0a040" font-size="9" text-anchor="middle">유저 관리</text>

  <!-- 콘텐츠CRUD: center(1685,763) rect(1607,750,116,26) -->
  <rect x="1607" y="750" width="116" height="26" rx="5" fill="#281808" stroke="#504020" stroke-width="1"/>
  <text x="1665" y="767" fill="#c0a040" font-size="9" text-anchor="middle">콘텐츠 CRUD</text>

  <!-- 태그관리: center(1685,788) rect(1607,775,116,26) -->
  <rect x="1607" y="775" width="116" height="26" rx="5" fill="#281808" stroke="#504020" stroke-width="1"/>
  <text x="1665" y="792" fill="#c0a040" font-size="9" text-anchor="middle">태그 관리</text>

  <!-- ═══ EDGES ═══ -->
  <!-- 모든 경로는 노드를 침범하지 않는 빈 공간 통로로만 라우팅 -->

  <!-- 1. 랜딩 → 비로그인홈: 오른쪽으로 나와 위로 올라감 -->
  <!-- 통로: x=200(노드들 사이 빈공간), y=118~395 -->
  <path d="M 180,385 L 200,385 L 200,145 L 225,145" stroke="#7b6ef6" stroke-width="1.5" fill="none" marker-end="url(#arr-p)"/>
  <text x="190" y="275" fill="#7b6ef6" font-size="9" text-anchor="middle" transform="rotate(-90,190,275)">EXPLORE</text>

  <!-- 2. 랜딩 → /login: 오른쪽으로 직선, y=420 통로 (비로그인홈 y=118~172, 아래 여백) -->
  <path d="M 180,410 L 423,410" stroke="#505060" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="302" y="404" fill="#505060" font-size="9" text-anchor="middle">Log in · Sign up</text>

  <!-- 3. 랜딩 → /my (이미 로그인): y=460 아래 통로 (login 아래 y=445, 통로 y=460) -->
  <path d="M 180,418 L 180,462 L 692,462 L 692,395 L 700,395" stroke="#3cb888" stroke-width="1" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-t)"/>
  <text x="436" y="475" fill="#3cb888" font-size="9" text-anchor="middle">이미 로그인</text>

  <!-- 4. 비로그인홈 → 검색필터: 오른쪽 위 대각 -->
  <path d="M 385,130 L 423,110" stroke="#4a3880" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <text x="415" y="115" fill="#6050a0" font-size="9" text-anchor="end">검색</text>

  <!-- 5. 비로그인홈 → 노드상세: x=408 통로 내려감 (검색필터 x=423~573, 통로 x=408) -->
  <path d="M 385,158 L 408,158 L 408,250 L 423,250" stroke="#4a3880" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <text x="403" y="210" fill="#6050a0" font-size="9" text-anchor="end">노드 클릭</text>

  <!-- 6. 노드상세 → /login (추가시도): y=277~395 수직 통로 -->
  <path d="M 498,277 L 498,395" stroke="#e05555" stroke-width="1" fill="none" marker-end="url(#arr-r)"/>
  <text x="513" y="340" fill="#c03030" font-size="9">추가 시도</text>

  <!-- 7. 비로그인홈 → /login (DB접근): x=407 통로, 노드상세 왼쪽 -->
  <path d="M 305,172 L 305,320 L 407,320 L 407,395 L 423,395" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3" fill="none" marker-end="url(#arr-r)"/>
  <text x="360" y="314" fill="#a02020" font-size="9" text-anchor="middle">DB 접근</text>

  <!-- 8. /login → /my: x=573~700 사이 통로, y=420 -->
  <path d="M 573,420 L 640,420 L 640,395 L 700,395" stroke="#4fc3a1" stroke-width="1.5" fill="none" marker-end="url(#arr-t)"/>
  <text x="636" y="412" fill="#4fc3a1" font-size="9" text-anchor="middle">인증 완료</text>

  <!-- 9. /my → 데이터뷰 group: x=862 통로 (DV section x=870, 왼쪽 8px 여백) -->
  <!-- 세 방향 분기: /my 우측(860,395) → x=862 → 위로 올라가 각 DV로 -->
  <path d="M 860,383 L 862,383 L 862,115 L 887,115" stroke="#2060a0" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 860,390 L 864,390 L 864,235 L 887,235" stroke="#2060a0" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 860,398 L 866,398 L 866,355 L 887,355" stroke="#2060a0" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="853" y="250" fill="#2060a0" font-size="9" text-anchor="end" transform="rotate(-90,853,250)">사이드바</text>

  <!-- 10. /my → 학습 group -->
  <path d="M 860,405 L 868,405 L 868,545 L 887,545" stroke="#2060a0" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 860,408 L 870,408 L 870,645 L 887,645" stroke="#2060a0" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- 11. /my → 설정 -->
  <path d="M 860,412 L 872,412 L 872,760 L 887,760" stroke="#2060a0" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- 12. 본초DV → 본초상세 -->
  <path d="M 1043,115 L 1113,115" stroke="#183848" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <text x="1078" y="109" fill="#304858" font-size="8" text-anchor="middle">클릭</text>

  <!-- 13. 경혈DV → 경혈상세 -->
  <path d="M 1043,235 L 1113,235" stroke="#183848" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 14. 방제DV → 방제상세 -->
  <path d="M 1043,355 L 1113,355" stroke="#183848" stroke-width="1" fill="none" marker-end="url(#arr)"/>

  <!-- 15. 플래시카드 → stats: x=1095 통로 (stats x=1113, 왼쪽) -->
  <path d="M 1043,545 L 1095,545 L 1095,585 L 1113,585" stroke="#183848" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <text x="1070" y="560" fill="#304858" font-size="8" text-anchor="middle">완료</text>

  <!-- 16. 퀴즈 → stats -->
  <path d="M 1043,645 L 1095,645 L 1095,600 L 1113,600" stroke="#183848" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <text x="1070" y="638" fill="#304858" font-size="8" text-anchor="middle">완료</text>

  <!-- 17. 설정 → /admin: y=760 통로, x=1043~1448 사이 노드 없음 -->
  <path d="M 1043,760 L 1420,760 L 1420,750 L 1448,750" stroke="#c09040" stroke-width="1.5" fill="none" marker-end="url(#arr-y)"/>
  <text x="1232" y="752" fill="#c09040" font-size="9" text-anchor="middle">admin 계정만</text>

  <!-- 18. 설정 → 랜딩 (로그아웃): y=840 아래 통로 (모든 노드 아래) -->
  <path d="M 965,783 L 965,840 L 105,840 L 105,420" stroke="#404050" stroke-width="1" stroke-dasharray="5,3" fill="none" marker-end="url(#arr)"/>
  <text x="535" y="833" fill="#404050" font-size="9" text-anchor="middle">로그아웃</text>

  <!-- 19. /admin → 하위 항목들 -->
  <path d="M 1592,740 L 1607,738" stroke="#504020" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <path d="M 1592,750 L 1607,763" stroke="#504020" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <path d="M 1592,760 L 1607,788" stroke="#504020" stroke-width="1" fill="none" marker-end="url(#arr)"/>

</svg>
