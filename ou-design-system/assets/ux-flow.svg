<svg viewBox="0 0 1820 880" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, 'Segoe UI', sans-serif;">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#505060"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#7b6ef6"/>
    </marker>
    <marker id="arr-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#4fc3a1"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#e05555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#c09040"/>
    </marker>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1820" height="880" fill="#0a0a0f"/>

  <!-- ═══ SECTION BACKGROUNDS ═══ -->

  <!-- 비로그인 홈 section: x=210 y=20 w=420 h=360 -->
  <rect x="210" y="20" width="420" height="360" rx="12" fill="#1a1528" stroke="#3a2860" stroke-width="1"/>
  <text x="228" y="44" fill="#a070e0" font-size="10" font-weight="700" letter-spacing="1.5">비로그인 홈</text>

  <!-- 로그인 홈 section: x=680 y=20 w=1120 w=840 -->
  <rect x="680" y="20" width="1120" height="840" rx="12" fill="#081828" stroke="#153050" stroke-width="1"/>
  <text x="698" y="44" fill="#40b090" font-size="10" font-weight="700" letter-spacing="1.5">로그인 홈</text>

  <!-- 데이터뷰 sub: x=870 y=60 w=480 h=420 -->
  <rect x="870" y="60" width="480" height="420" rx="8" fill="#0c2040" stroke="#1a3a60" stroke-width="1"/>
  <text x="885" y="80" fill="#6090c0" font-size="9" font-weight="600" letter-spacing="1">데이터뷰</text>

  <!-- 학습 sub: x=870 y=500 w=480 h=240 -->
  <rect x="870" y="500" width="480" height="240" rx="8" fill="#0c2040" stroke="#1a3a60" stroke-width="1"/>
  <text x="885" y="520" fill="#6090c0" font-size="9" font-weight="600" letter-spacing="1">학습</text>

  <!-- 관리자 section: x=1430 y=700 w=360 h=145 -->
  <rect x="1430" y="700" width="360" height="145" rx="8" fill="#281808" stroke="#503010" stroke-width="1"/>
  <text x="1447" y="720" fill="#c09040" font-size="9" font-weight="600" letter-spacing="1">관리자 전용</text>

  <!-- ═══ NODES ═══ -->

  <!-- 랜딩페이지: center(105,395) rect(30,370,150,50) -->
  <rect x="30" y="370" width="150" height="50" rx="8" fill="#111" stroke="#ffffff" stroke-width="1.5"/>
  <text x="105" y="390" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">/ 랜딩페이지</text>
  <text x="105" y="408" fill="#707080" font-size="9" text-anchor="middle">진입점</text>

  <!-- 비로그인홈 (/universe): center(305,145) rect(225,118,160,54) -->
  <rect x="225" y="118" width="160" height="54" rx="8" fill="#241c3c" stroke="#7b6ef6" stroke-width="1.5"/>
  <text x="305" y="139" fill="#c0a8f8" font-size="11" font-weight="700" text-anchor="middle">/universe</text>
  <text x="305" y="158" fill="#8060c0" font-size="9" text-anchor="middle">Home 홈</text>

  <!-- 검색필터: center(498,110) rect(423,87,150,46) -->
  <rect x="423" y="87" width="150" height="46" rx="6" fill="#1c1530" stroke="#4a3880" stroke-width="1"/>
  <text x="498" y="106" fill="#b0a0e0" font-size="10" text-anchor="middle">검색 결과 필터</text>
  <text x="498" y="122" fill="#605878" font-size="9" text-anchor="middle">그래프 실시간 필터</text>

  <!-- 노드상세: center(498,250) rect(423,223,150,54) -->
  <rect x="423" y="223" width="150" height="54" rx="6" fill="#1c1530" stroke="#4a3880" stroke-width="1"/>
  <text x="498" y="244" fill="#b0a0e0" font-size="10" text-anchor="middle">노드 상세 패널</text>
  <text x="498" y="262" fill="#605878" font-size="9" text-anchor="middle">추가 시도 → 로그인</text>

  <!-- /login: center(498,420) rect(423,395,150,50) -->
  <rect x="423" y="395" width="150" height="50" rx="8" fill="#181818" stroke="#505060" stroke-width="1.5"/>
  <text x="498" y="415" fill="#c0c0cc" font-size="11" font-weight="700" text-anchor="middle">/login</text>
  <text x="498" y="433" fill="#606068" font-size="9" text-anchor="middle">로그인 · 회원가입</text>

  <!-- /my (Home): center(780,395) rect(700,368,160,54) -->
  <rect x="700" y="368" width="160" height="54" rx="8" fill="#0c2c1c" stroke="#3cb888" stroke-width="2"/>
  <text x="780" y="389" fill="#60e8a8" font-size="11" font-weight="700" text-anchor="middle">/my</text>
  <text x="780" y="408" fill="#309868" font-size="10" text-anchor="middle">Home 홈</text>

  <!-- 본초 DV: center(965,115) rect(887,92,156,46) -->
  <rect x="887" y="92" width="156" height="46" rx="6" fill="#0a1c38" stroke="#1e4070" stroke-width="1"/>
  <text x="965" y="110" fill="#80b8e8" font-size="10" text-anchor="middle">/boncho</text>
  <text x="965" y="128" fill="#3a6090" font-size="9" text-anchor="middle">본초 데이터뷰</text>

  <!-- 경혈 DV: center(965,235) rect(887,212,156,46) -->
  <rect x="887" y="212" width="156" height="46" rx="6" fill="#0a1c38" stroke="#1e4070" stroke-width="1"/>
  <text x="965" y="230" fill="#80b8e8" font-size="10" text-anchor="middle">/acupoint</text>
  <text x="965" y="248" fill="#3a6090" font-size="9" text-anchor="middle">경혈 데이터뷰</text>

  <!-- 방제 DV: center(965,355) rect(887,332,156,46) -->
  <rect x="887" y="332" width="156" height="46" rx="6" fill="#0a1c38" stroke="#1e4070" stroke-width="1"/>
  <text x="965" y="350" fill="#80b8e8" font-size="10" text-anchor="middle">/prescription</text>
  <text x="965" y="368" fill="#3a6090" font-size="9" text-anchor="middle">방제 데이터뷰</text>

  <!-- 본초 상세: center(1195,115) rect(1113,92,164,46) -->
  <rect x="1113" y="92" width="164" height="46" rx="6" fill="#081828" stroke="#183848" stroke-width="1"/>
  <text x="1195" y="110" fill="#6090b8" font-size="10" text-anchor="middle">본초 노드 상세</text>
  <text x="1195" y="128" fill="#304858" font-size="9" text-anchor="middle">내 우주 추가 → 홈 반영</text>

  <!-- 경혈 상세: center(1195,235) rect(1113,212,164,46) -->
  <rect x="1113" y="212" width="164" height="46" rx="6" fill="#081828" stroke="#183848" stroke-width="1"/>
  <text x="1195" y="230" fill="#6090b8" font-size="10" text-anchor="middle">경혈 노드 상세</text>
  <text x="1195" y="248" fill="#304858" font-size="9" text-anchor="middle">내 우주 추가 → 홈 반영</text>

  <!-- 방제 상세: center(1195,355) rect(1113,332,164,46) -->
  <rect x="1113" y="332" width="164" height="46" rx="6" fill="#081828" stroke="#183848" stroke-width="1"/>
  <text x="1195" y="350" fill="#6090b8" font-size="10" text-anchor="middle">방제 노드 상세</text>
  <text x="1195" y="368" fill="#304858" font-size="9" text-anchor="middle">내 우주 추가 → 홈 반영</text>

  <!-- 플래시카드: center(965,545) rect(887,522,156,46) -->
  <rect x="887" y="522" width="156" height="46" rx="6" fill="#0a1c38" stroke="#1e4070" stroke-width="1"/>
  <text x="965" y="540" fill="#80b8e8" font-size="10" text-anchor="middle">/flashcard</text>
  <text x="965" y="558" fill="#3a6090" font-size="9" text-anchor="middle">설정 → 학습 → 완료</text>

  <!-- 퀴즈: center(965,645) rect(887,622,156,46) -->
  <rect x="887" y="622" width="156" height="46" rx="6" fill="#0a1c38" stroke="#1e4070" stroke-width="1"/>
  <text x="965" y="640" fill="#80b8e8" font-size="10" text-anchor="middle">/quiz</text>
  <text x="965" y="658" fill="#3a6090" font-size="9" text-anchor="middle">설정 → 문제 → 결과</text>

  <!-- stats: center(1190,585) rect(1113,562,154,46) -->
  <rect x="1113" y="562" width="154" height="46" rx="6" fill="#081828" stroke="#183848" stroke-width="1"/>
  <text x="1190" y="580" fill="#6090b8" font-size="10" text-anchor="middle">/stats</text>
  <text x="1190" y="598" fill="#304858" font-size="9" text-anchor="middle">학습 통계</text>

  <!-- 설정: center(965,760) rect(887,737,156,46) -->
  <rect x="887" y="737" width="156" height="46" rx="6" fill="#0a1c38" stroke="#1e4070" stroke-width="1"/>
